<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />

        <meta name="viewport" content="width=device-width, initial-scale=1.0" />

        <title>Hire Me</title>

        <!-- CSS -->
        <link rel="stylesheet" href="CSS/hire.css" />
        <link rel="stylesheet" href="CSS/nav.css" />

        <!-- GOOGLE FONT -->
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
            rel="stylesheet" />
    </head>

    <body>
        <!-- NAVBAR -->
        <nav class="navbar">
            <div class="logo">VANSSH KHANNA<span></span></div>

            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="About.html">About</a></li>
                <li><a href="work.html">Work</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
        <!-- FORM SECTION -->
        <section class="hire-section">
            <!-- GLOW -->
            <div class="glow"></div>

            <!-- FORM CONTAINER -->
            <div class="form-container">
                <p class="section-tag">• LET'S WORK TOGETHER</p>

                <h1>Hire <span>Me</span></h1>

                <p class="form-desc">Fill in your details and let's create something amazing together.</p>

                <!-- FORM -->
                <form class="hire-form">
                    <!-- NAME -->
                    <div class="input-box">
                        <label>Full Name</label>

                        <input type="text" placeholder="Enter your full name" required />
                    </div>

                    <!-- EMAIL -->
                    <div class="input-box">
                        <label>Email Address</label>

                        <input type="email" placeholder="Enter your email" required />
                    </div>

                    <!-- PHONE -->
                    <div class="input-box">
                        <label>Phone Number</label>

                        <input type="tel" placeholder="Enter your phone number" required />
                    </div>

                    <!-- COMPANY -->
                    <div class="input-box">
                        <label>Company Name</label>

                        <input type="text" placeholder="Enter company name" />
                    </div>

                    <!-- PROJECT TYPE -->
                    <div class="input-box">
                        <label>Project Type</label>

                        <select required>
                            <option value="">Select Project Type</option>

                            <option>VFX</option>

                            <option>Motion Graphics</option>

                            <option>Video Editing</option>

                            <option>3D Animation</option>
                        </select>
                    </div>

                    <!-- MESSAGE -->
                    <div class="input-box">
                        <label>Project Details</label>

                        <textarea rows="5" placeholder="Tell me about your project..."></textarea>
                    </div>

                    <!-- BUTTON -->
                    <button type="submit" class="submit-btn">Submit Inquiry</button>
                </form>
            </div>
        </section>
    </body>
</html>
